server:
  port: 9000

spring:
  application:
    name: xpensify
  profiles:
    active: dev
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true
  jackson:
    mapper:
      ACCEPT_CASE_INSENSITIVE_ENUMS: 'true'

jwt:
  secret: qwertyuiopasdfghjklzxcvbnmQWERTYUASDFGHJZXCVBNwerty
  expiry: 60000

springdoc:
  swagger-ui:
    enabled: true
  version: 2.6.7
  api-docs:
    enabled: true